<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang chuyển hướng...</title>
  <script>
    async function checkMaintenance() {
      try {
        const flagUrl = new URL('maintenance.json', window.location.href);
        const maintenanceUrl = new URL('maintenance.html', window.location.href);
        const indexUrl = new URL('index.html', window.location.href);
        const res = await fetch(flagUrl.toString() + '?ts=' + Date.now());
        const data = await res.json();
        if (data.maintenance) {
          window.location.replace(maintenanceUrl.toString());
        } else {
          window.location.replace(indexUrl.toString());
        }
      } catch (e) {
        window.location.replace(new URL('index.html', window.location.href).toString());
      }
    }
    checkMaintenance();
  </script>
</head>
<body>
  <p>Đang kiểm tra trạng thái trang...</p>
</body>
</html>
