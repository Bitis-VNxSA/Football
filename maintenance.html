<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penalty Master - Bảo trì</title>
  <style>
    :root {
      --bg-1: #07131f;
      --bg-2: #10324b;
      --accent: #f1c40f;
      --accent-2: #e74c3c;
      --text: #f8fbff;
      --muted: #aebfd4;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #17486b 0%, var(--bg-1) 45%, #030910 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(120deg, rgba(241,196,15,0.10), transparent 30%, rgba(231,76,60,0.12));
      pointer-events: none;
    }

    .maintenance-card {
      width: min(96vw, 980px);
      background: rgba(7, 19, 31, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .maintenance-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      border: 1px solid rgba(241,196,15,0.22);
      pointer-events: none;
    }

    .status-badge {
      display: inline-block;
      background: rgba(241,196,15,0.18);
      color: var(--accent);
      border: 1px solid rgba(241,196,15,0.3);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.8rem;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(1.8rem, 3.2vw, 2.8rem);
      margin: 0 0 10px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      margin: 0 0 20px;
      max-width: 680px;
    }

    .field-wrap {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, #1d713f 0%, #2da04f 100%);
      box-shadow: inset 0 -10px 25px rgba(0,0,0,0.2);
      margin-top: 14px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16/9;
      background: linear-gradient(180deg, #288b49 0%, #1f6a3a 100%);
    }

    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 700px) {
      .maintenance-card { padding: 20px; }
      .info-row { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="maintenance-card">
    <div class="status-badge">⚽ Bảo trì hệ thống</div>
    <h1>Website đang được sửa chữa và nâng cấp</h1>
    <p class="subtitle">Chúng tôi đang cập nhật nội dung và cải thiện trải nghiệm. Xin vui lòng quay lại sau!</p>

    <div class="field-wrap">
      <canvas id="maintenanceCanvas" width="1200" height="675"></canvas>
    </div>

    <div class="info-row">
      <span class="pill">🛠️ Đang tối ưu nội dung</span>
      <span class="pill">⏰ 10:37</span>
      <span class="pill">🌙 6:50</span>
      <span class="pill">⚡ Sẽ mở lại sớm</span>
      <span class="pill">🎯 Hỗ trợ học Python tốt hơn</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('maintenanceCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      canvas.w = rect.width;
      canvas.h = rect.height;
    };
    window.addEventListener('resize', resize);
    resize();

    const onanaImg = new Image();
    let onanaReady = false;
    onanaImg.onload = () => {
      onanaReady = true;
    };
    onanaImg.src = 'img/onana.png';

    function drawField() {
      ctx.clearRect(0, 0, canvas.w, canvas.h);

      const grad = ctx.createLinearGradient(0, 0, 0, canvas.h);
      grad.addColorStop(0, '#1c7f42');
      grad.addColorStop(1, '#0f5d2f');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.w, canvas.h);

      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 2;
      ctx.strokeRect(40, 50, canvas.w - 80, canvas.h - 100);
      ctx.beginPath();
      ctx.arc(canvas.w / 2, canvas.h / 2 + 20, 70, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(canvas.w / 2, 50);
      ctx.lineTo(canvas.w / 2, canvas.h - 50);
      ctx.stroke();

    }

    function drawOnana(x, y) {
      const t = performance.now() / 1000;
      const bob = Math.sin(t * 2.4) * 4;
      const armSwing = Math.sin(t * 2.2) * 0.16;

      ctx.save();
      ctx.translate(x, y + bob);

      if (onanaReady && onanaImg.naturalWidth) {
        const imgW = Math.min(640, canvas.w * 0.54);
        const imgH = imgW * (onanaImg.naturalHeight / onanaImg.naturalWidth);
        ctx.drawImage(onanaImg, -imgW / 2, -imgH, imgW, imgH);
      } else {
        ctx.strokeStyle = '#17263a';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-10, 92);
        ctx.lineTo(-18, 135);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(10, 92);
        ctx.lineTo(24, 130);
        ctx.stroke();
        ctx.fillStyle = '#14233b';
        ctx.fillRect(-18, 28, 36, 56);
        ctx.beginPath();
        ctx.arc(0, 8, 16, 0, Math.PI * 2);
        ctx.fillStyle = '#f2ccb0';
        ctx.fill();
      }

      ctx.translate(240, -110 + armSwing * 12);
      ctx.rotate(-0.12 + armSwing * 0.08);
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(0, -36, 150, 72);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.strokeRect(0, -36, 150, 72);
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 20px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('BẢO TRÌ', 75, 2);
      ctx.textAlign = 'left';

      ctx.restore();
    }

    function animate() {
      drawField();
      drawOnana(canvas.w * 0.5, canvas.h * 0.72);

      ctx.save();
      ctx.font = '700 32px Segoe UI';
      ctx.fillStyle = 'rgba(255,255,255,0.97)';
      ctx.font = '600 18px Segoe UI';
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText('Sắp quay lại với những bài tập Python mới!', 50, 108);
      ctx.restore();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
